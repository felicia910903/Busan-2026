<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>釜山行程表</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 p-4">
    <div id="root"></div>

    <script type="text/babel">
        // 在這裡填入您的行程資料
        const itinerary = {
            "週四": [{ time: "10:00", location: "抵達釜山" }],
            "週五": [],
            "週六": [],
            "週日": [],
            "週一": [],
            "週二": [{ time: "15:00", location: "返程" }]
        };

        function App() {
            return (
                <div className="max-w-md mx-auto">
                    <h1 className="text-2xl font-black mb-6 text-slate-800">釜山行程表</h1>
                    {Object.entries(itinerary).map(([day, items]) => (
                        <div key={day} className="mb-6 bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                            <h2 className="text-lg font-bold text-red-600 mb-3 border-b border-red-100 pb-1">{day}</h2>
                            {items.length === 0 ? <p className="text-slate-400 text-sm">無行程</p> :
                                items.map((item, i) => (
                                    <div key={i} className="mb-2 text-sm flex items-center">
                                        <span className="font-bold text-red-500 mr-3 w-12 shrink-0">{item.time}</span>
                                        <span className="font-medium text-slate-700">{item.location}</span>
                                    </div>
                                ))
                            }
                        </div>
                    ))}
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
